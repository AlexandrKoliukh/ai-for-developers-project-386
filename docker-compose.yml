services:
  claude-code:
    build: .
    container_name: claude-code
    profiles: ["claude"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - ${HOME}/.claude:/root/.claude:cached
      - ${HOME}/.claude.json:/root/.claude.json:cached
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

  mock-api:
    image: stoplight/prism:4
    command: mock -h 0.0.0.0 /spec/openapi.yaml --dynamic
    volumes:
      - ./src/spec/tsp-output/@typespec/openapi3/openapi.yaml:/spec/openapi.yaml:ro
    ports:
      - "4010:4010"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - mock-api
    environment:
      - VITE_MOCK_API_URL=http://mock-api:4010
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
